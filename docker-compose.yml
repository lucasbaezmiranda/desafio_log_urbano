services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-logurbano}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logurbano_dev}
      POSTGRES_DB: ${POSTGRES_DB:-logurbano}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-logurbano}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3001}:3000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-logurbano}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-logurbano_dev}
      POSTGRES_DB: ${POSTGRES_DB:-logurbano}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
